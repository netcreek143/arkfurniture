<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ark Furniture | Category</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="category.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- DYNAMIC SHARED HEADER (Top Bar + Navbar) -->
    <header id="shared-header"></header>

    <!-- CATEGORY HERO BANNER -->
    <section class="category-hero" id="categoryHero">
        <!-- Content injected via category.js -->
    </section>

    <!-- QUICK CATEGORY TILE ROW -->
    <section class="quick-tiles-section">
        <div class="quick-tiles-container" id="quickTilesRow">
            <!-- Tiles injected via category.js -->
        </div>
    </section>

    <!-- BREADCRUMB ROW -->
    <div class="breadcrumb-container">
        <div class="breadcrumbs" id="breadcrumbs">
            <!-- Breadcrumbs injected via category.js -->
        </div>
    </div>

    <!-- MAIN PRODUCT LISTING SECTION -->
    <main class="main-listing-section">
        <!-- Sidebar Filters -->
        <aside class="sidebar-filters">
            <!-- Content injected via category.js -->
        </aside>

        <!-- Product Grid Content -->
        <section class="listing-content">
            <div class="listing-header">
                <span class="results-count" id="resultsCount">0 Results</span>
            </div>
            
            <div class="product-grid" id="productGrid">
                <!-- Products injected via category.js -->
            </div>
        </section>
    </main>

    <!-- SHARED USP SECTION -->
    <div id="shared-usp"></div>

    <!-- DYNAMIC LEAD CAPTURE -->
    <div id="shared-lead-capture"></div>

    <!-- DYNAMIC BROCHURE BANNER -->
    <div id="shared-brochure-banner"></div>

    <!-- DYNAMIC FOOTER -->
    <div id="shared-footer"></div>

    <!-- DYNAMIC LOGIN MODAL -->
    <div id="shared-login-modal"></div>

    <!-- DYNAMIC VIDEO MODAL -->
    <div id="shared-video-modal"></div>

    <!-- DYNAMIC SEARCH OVERLAY -->
    <div id="shared-search-overlay"></div>

    <!-- DYNAMIC WISHLIST SIDEBAR -->
    <div id="shared-wishlist-sidebar"></div>

    <!-- DYNAMIC CART SIDEBAR -->
    <div id="shared-cart-sidebar"></div>

    <!-- DYNAMIC MOBILE MENU -->
    <div id="shared-mobile-menu"></div>

    <script src="products.js"></script>
    <script src="components.js"></script>
    <script src="category.js"></script>
</body>
</html>
