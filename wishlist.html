<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ark Furniture | Wishlist & Recently Viewed</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- DYNAMIC SHARED HEADER -->
    <header id="shared-header"></header>

    <main class="wishlist-layout">
        <!-- Sidebar -->
        <aside class="wishlist-sidebar">
            <div class="sidebar-item active" id="tabWishlist">
                <div class="sidebar-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--color-orange)">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                </div>
                <div class="sidebar-item-info">
                    <h4>My Wishlist</h4>
                    <p>Your favourites All In One Place</p>
                </div>
            </div>

            <div class="sidebar-item" id="tabRecently">
                <div class="sidebar-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                </div>
                <div class="sidebar-item-info">
                    <h4>Recently Viewed</h4>
                    <p>View Your Browsing History</p>
                </div>
            </div>
        </aside>

        <!-- Product Grid -->
        <section class="wishlist-content">
            <div class="wishlist-grid" id="wishlistGrid">
                <!-- Cards injected here -->
            </div>
        </section>
    </main>

    <!-- SHARED USP SECTION -->
    <div id="shared-usp"></div>

    <!-- Shared Components -->
    <div id="shared-lead-capture"></div>
    <div id="shared-footer"></div>
    <div id="shared-login-modal"></div>
    <div id="shared-search-overlay"></div>
    <div id="shared-wishlist-sidebar"></div>
    <div id="shared-cart-sidebar"></div>

    <script src="products.js"></script>
    <script src="components.js"></script>
    <script>
        const WishlistPage = {
            currentTab: 'wishlist', // or 'recently'
            
            init() {
                this.render();
                this.initListeners();
            },

            initListeners() {
                document.getElementById('tabWishlist').addEventListener('click', () => {
                    this.currentTab = 'wishlist';
                    this.updateTabs();
                    this.render();
                });
                document.getElementById('tabRecently').addEventListener('click', () => {
                    this.currentTab = 'recently';
                    this.updateTabs();
                    this.render();
                });
            },

            updateTabs() {
                document.getElementById('tabWishlist').classList.toggle('active', this.currentTab === 'wishlist');
                document.getElementById('tabRecently').classList.toggle('active', this.currentTab === 'recently');
                
                // Update icons colors too if needed
                const wishlistIcon = document.querySelector('#tabWishlist svg');
                const recentlyIcon = document.querySelector('#tabRecently svg');
                
                if (this.currentTab === 'wishlist') {
                    wishlistIcon.setAttribute('fill', 'var(--color-orange)');
                    recentlyIcon.setAttribute('stroke', '#888');
                } else {
                    wishlistIcon.setAttribute('fill', '#888');
                    recentlyIcon.setAttribute('stroke', 'var(--color-orange)');
                }
            },

            render() {
                const grid = document.getElementById('wishlistGrid');
                let items = [];

                if (this.currentTab === 'wishlist') {
                    items = JSON.parse(localStorage.getItem('ark_wishlist')) || [];
                } else {
                    const viewedIds = JSON.parse(localStorage.getItem('ark_recent_viewed')) || [];
                    console.log('Retrieved History IDs:', viewedIds);
                    const db = window.products || products;
                    items = viewedIds.map(id => db[id]).filter(p => p);
                    console.log('Mapped History Items:', items);
                }

                if (items.length === 0) {
                    grid.innerHTML = `<div class="empty-state"><p>No items found.</p></div>`;
                    return;
                }

                grid.innerHTML = items.map(item => `
                    <div class="wishlist-card">
                        <div class="card-image-box">
                            ${item.discount ? `<div class="card-badge-off">${item.discount.replace(' OFF', '')} OFF</div>` : ''}
                            <button class="card-heart-btn" onclick="WishlistPage.toggleWishlist('${item.id}')">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="${this.isInWishlist(item.id) ? 'var(--color-orange)' : 'none'}" stroke="${this.isInWishlist(item.id) ? 'var(--color-orange)' : '#888'}" stroke-width="2">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                </svg>
                            </button>
                            <img src="${item.image || item.mainImage}" alt="${item.name}">
                            ${item.badge ? `<div class="card-status-strip">${item.badge}</div>` : ''}
                        </div>
                        <div class="card-info">
                            <h3 class="card-name">${item.name}</h3>
                            <div class="card-prices">
                                <span class="card-old-price">₹${item.oldPrice || ''}</span>
                                <span class="card-new-price">₹${item.price || item.newPrice}</span>
                            </div>
                            <p class="card-tax-info">Price inclusive of all taxes | Pan India Shipping</p>
                            <p class="card-emi-info">EMI starts from ₹${item.emi || '2,921'}</p>
                        </div>
                    </div>
                `).join('');
            },

            isInWishlist(id) {
                const wishlist = JSON.parse(localStorage.getItem('ark_wishlist')) || [];
                return wishlist.some(item => item.id === id);
            },

            toggleWishlist(id) {
                const product = products[id];
                if (!product) return;
                
                // Use SharedComponents logic
                SharedComponents.Wishlist.toggle({
                    id: product.id,
                    name: product.name,
                    price: product.price || product.newPrice,
                    image: product.image || product.mainImage,
                    oldPrice: product.oldPrice,
                    discount: product.discount,
                    badge: product.badge,
                    emi: product.emi
                });
                
                this.render();
            }
        };

        document.addEventListener('DOMContentLoaded', () => WishlistPage.init());
    </script>
</body>
</html>
